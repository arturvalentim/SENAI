<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>margin e padding </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container-gamer">
        <h1>🎮 margin e padding - estilo gamer </h1>
        <div class="bloco azul">
            <p><strong>🎯 pading: 30px</strong> - espaço interno </p>
            <p> O escudo azul cresceu para dentro. </p>
            </div>
            <div class="bloco verde">
                <p><strong>⚔️ margin: 30 px </strong> - espaço externo </p>
                <p>O bloco verde se afastou dos outros. </p>
                </div>
                <div class="bloco laranja ">
                    <p><strong>🔥 margin: 20px + padding: 20px </strong></p>
                    <p>margin afasta por fora. padding cresce por dentro </p>
                    </div>
                    </main>
    
</body>
</html>
