<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Image — AURA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🔥 Background Image — AURA</h1>
    </header>

    <main class="container">
        <div class="card">
            <p class="label label-yellow">Repeat (padrão) — repete a imagem</p>
            <div class="bg-box bg-repeat"></div>
        </div>

        <div class="card">
            <p class="label label-purple">No Repeat — imagem aparece uma vez</p>
            <div class="bg-box bg-no-repeat"></div>
        </div>

        <div class="card">
            <p class="label">Center — imagem centralizada</p>
            <div class="bg-box bg-center"></div>
        </div>

        <div class="card">
            <p class="label">Cover — imagem cobre tudo</p>
            <div class="bg-box bg-cover"></div>
        </div>

        <div class="card">
            <p class="label">Bottom Right — imagem no canto inferior direito</p>
            <div class="bg-box bg-bottom-right"></div>
        </div>
    </main>

</body>
</html>
